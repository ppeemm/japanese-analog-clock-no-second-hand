<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アナログ時計</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #141416;
      --surface: #1e1e22;
      --rust-1: #6b6b78;
      --rust-2: #9a9aaa;
      --rust-3: #7a7a8a;
      --copper: #b0b0be;
      --copper-dim: #5a5a66;
      --tick: #3a3a42;
      --tick-major: #78788a;
      --text: #c0c0cc;
      --text-dim: #55555f;
    }

    body {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
      user-select: none;
    }

    .clock-wrapper {
      position: relative;
      width: 320px;
      height: 320px;
    }

    svg.clock {
      width: 100%;
      height: 100%;
    }

    /* Tick marks */
    .tick-major {
      stroke: var(--tick-major);
      stroke-width: 2;
      stroke-linecap: round;
    }

    /* Hour numbers */
    .hour-num {
      fill: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 300;
      text-anchor: middle;
      dominant-baseline: central;
    }

    .hour-num.dim {
      fill: var(--text-dim);
      font-size: 9px;
    }

    /* Hands */
    .hand-hour {
      stroke: var(--copper);
      stroke-width: 4;
      stroke-linecap: round;
    }

    .hand-minute {
      stroke: var(--rust-2);
      stroke-width: 2.5;
      stroke-linecap: round;
    }

    /* Center dot */
    .center-dot-outer {
      fill: var(--rust-3);
    }

    .center-dot-inner {
      fill: var(--bg);
    }


  </style>
</head>
<body>
  <div class="clock-wrapper">
    <svg class="clock" viewBox="0 0 200 200" id="clock">


      <!-- Edge -->
      <circle cx="100" cy="100" r="95" fill="none" stroke="var(--copper-dim)" stroke-width="1.5" />

      <!-- Tick marks (generated by JS) -->
      <g id="ticks"></g>

      <!-- Hour numbers -->
      <g id="numbers"></g>



      <!-- Hands -->
      <line class="hand-hour" id="hand-hour" x1="100" y1="100" x2="100" y2="48" />
      <line class="hand-minute" id="hand-minute" x1="100" y1="100" x2="100" y2="30" />



      <!-- Center cap -->
      <circle class="center-dot-outer" cx="100" cy="100" r="4" />
      <circle class="center-dot-inner" cx="100" cy="100" r="1.5" />
    </svg>
  </div>

  <script>
    const CX = 100, CY = 100;

    // Generate hour ticks only
    const ticksGroup = document.getElementById('ticks');
    for (let i = 0; i < 12; i++) {
      const angle = (i * 30 - 90) * (Math.PI / 180);
      const outerR = 93;
      const innerR = 83;

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', CX + outerR * Math.cos(angle));
      line.setAttribute('y1', CY + outerR * Math.sin(angle));
      line.setAttribute('x2', CX + innerR * Math.cos(angle));
      line.setAttribute('y2', CY + innerR * Math.sin(angle));
      line.setAttribute('class', 'tick-major');
      ticksGroup.appendChild(line);
    }

    // Generate hour numbers
    const numbersGroup = document.getElementById('numbers');
    const hourLabels = ['十二','一','二','三','四','五','六','七','八','九','十','十一'];
    hourLabels.forEach((num, i) => {
      const angle = (i * 30 - 90) * (Math.PI / 180);
      const r = 74;
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', CX + r * Math.cos(angle));
      text.setAttribute('y', CY + r * Math.sin(angle));
      text.setAttribute('class', 'hour-num' + ([0, 3, 6, 9].includes(i) ? '' : ' dim'));
      text.textContent = num;
      numbersGroup.appendChild(text);
    });

    // Hand elements
    const hourHand = document.getElementById('hand-hour');
    const minuteHand = document.getElementById('hand-minute');

    function setHand(el, angleDeg, cx, cy, length) {
      const rad = (angleDeg - 90) * (Math.PI / 180);
      el.setAttribute('x1', cx);
      el.setAttribute('y1', cy);
      el.setAttribute('x2', cx + length * Math.cos(rad));
      el.setAttribute('y2', cy + length * Math.sin(rad));
    }

    function update() {
      const now = new Date();
      const m = now.getMinutes() + now.getSeconds() / 60;
      const h = (now.getHours() % 12) + m / 60;

      setHand(hourHand, h * 30, CX, CY, 45);
      setHand(minuteHand, m * 6, CX, CY, 78);

      requestAnimationFrame(update);
    }

    requestAnimationFrame(update);
  </script>
</body>
</html>
